name: Go Format

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gofmt:
    name: gofmt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check gofmt
        shell: bash
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "Go files are not gofmt-formatted:"
            echo "$files"
            echo
            echo "Run gofmt -w on the listed files."
            exit 1
          fi
