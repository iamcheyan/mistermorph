name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/console/pnpm-lock.yaml

      - name: Install frontend deps
        run: pnpm --dir web/console install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir web/console build

      - name: Stage console assets
        shell: bash
        run: ./scripts/stage-console-assets.sh

      - name: Run tests
        run: go test ./...

      - name: Run GoReleaser (tag release)
        if: startsWith(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser (snapshot)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload snapshot artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: goreleaser-dist
          path: dist/*

  desktop-apps:
    name: Build Desktop App (${{ matrix.label }})
    if: startsWith(github.ref, 'refs/tags/')
    needs: goreleaser
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-amd64
            os: ubuntu-24.04
            goos: linux
            goarch: amd64
            desktop_asset: mistermorph-desktop-linux-amd64.AppImage
            update_asset: mistermorph-desktop-linux-amd64.tar.gz
            raw_desktop_binary: dist/mistermorph-desktop
            bundled_backend_binary: dist/mistermorph
            package_kind: appimage
            go_build_tags: "wailsdesktop production"
          - label: macos-arm64
            os: macos-14
            goos: darwin
            goarch: arm64
            desktop_asset: mistermorph-desktop-darwin-arm64.dmg
            update_asset: mistermorph-desktop-darwin-arm64.tar.gz
            raw_desktop_binary: dist/mistermorph-desktop
            bundled_backend_binary: dist/mistermorph
            package_kind: dmg
            go_build_tags: "wailsdesktop production"
          - label: windows-amd64
            os: windows-2022
            goos: windows
            goarch: amd64
            desktop_asset: mistermorph-desktop-windows-amd64.zip
            update_asset: ""
            raw_desktop_binary: dist/mistermorph-desktop.exe
            bundled_backend_binary: dist/mistermorph.exe
            package_kind: zip
            go_build_tags: "wailsdesktop production"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/console/pnpm-lock.yaml

      - name: Install frontend deps
        run: pnpm --dir web/console install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir web/console build

      - name: Stage console assets
        shell: bash
        run: ./scripts/stage-console-assets.sh

      - name: Install Linux desktop build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Verify desktop package compiles
        run: go test -tags "${{ matrix.go_build_tags }}" ./desktop/wails -count=1

      - name: Generate Windows desktop icon resources
        if: runner.os == 'Windows'
        shell: bash
        env:
          ARCH: ${{ matrix.goarch }}
        run: ./scripts/generate-desktop-windows-resources.sh

      - name: Build desktop app binary
        shell: bash
        run: |
          mkdir -p dist
          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" \
            go build -trimpath -tags "${{ matrix.go_build_tags }}" -ldflags "-s -w" -o "${{ matrix.raw_desktop_binary }}" ./desktop/wails

      - name: Build bundled backend binary
        shell: bash
        run: |
          CGO_ENABLED=0 GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" \
            go build -trimpath -ldflags "-s -w" -o "${{ matrix.bundled_backend_binary }}" ./cmd/mistermorph

      - name: Import macOS signing certificate
        if: matrix.package_kind == 'dmg' && env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_FILE="$(mktemp /tmp/cert.XXXXXX).p12"
          echo "${APPLE_CERTIFICATE_BASE64}" | base64 --decode > "${CERT_FILE}"
          KEYCHAIN="build.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          security create-keychain -p "${KEYCHAIN_PW}" "${KEYCHAIN}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN}"
          security unlock-keychain -p "${KEYCHAIN_PW}" "${KEYCHAIN}"
          security import "${CERT_FILE}" -P "${APPLE_CERTIFICATE_PASSWORD}" \
            -A -t cert -f pkcs12 -k "${KEYCHAIN}"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "${KEYCHAIN_PW}" "${KEYCHAIN}"
          security list-keychains -d user -s "${KEYCHAIN}" $(security list-keychains -d user | tr -d '"')
          rm -f "${CERT_FILE}"

      - name: Package macOS DMG
        if: matrix.package_kind == 'dmg'
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.goarch }}
          CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          VERSION="${VERSION#v}" \
          ARCH="${ARCH}" \
          DESKTOP_BIN="${{ matrix.raw_desktop_binary }}" \
          BACKEND_BIN="${{ matrix.bundled_backend_binary }}" \
          OUT_DIR="dist" \
          TARBALL_PATH="dist/${{ matrix.update_asset }}" \
          CODESIGN_IDENTITY="${CODESIGN_IDENTITY}" \
          APPLE_ID="${APPLE_ID}" \
          APPLE_TEAM_ID="${APPLE_TEAM_ID}" \
          APPLE_APP_PASSWORD="${APPLE_APP_PASSWORD}" \
          ./desktop/wails/packaging/package-darwin.sh

      - name: Package Linux AppImage
        if: matrix.package_kind == 'appimage'
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${VERSION#v}" \
          ARCH="${ARCH}" \
          DESKTOP_BIN="${{ matrix.raw_desktop_binary }}" \
          BACKEND_BIN="${{ matrix.bundled_backend_binary }}" \
          OUT_DIR="dist" \
          APPIMAGE_NAME="${{ matrix.desktop_asset }}" \
          TARBALL_PATH="dist/${{ matrix.update_asset }}" \
          ./desktop/wails/packaging/package-linux-appimage.sh

      - name: Sign Windows binaries
        if: matrix.package_kind == 'zip' && env.WINDOWS_CERTIFICATE_BASE64 != ''
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          foreach ($bin in @("${{ matrix.raw_desktop_binary }}", "${{ matrix.bundled_backend_binary }}")) {
            & $signtool sign /f $certPath /p $env:WINDOWS_CERTIFICATE_PASSWORD `
              /tr http://timestamp.digicert.com /td sha256 /fd sha256 $bin
          }
          Remove-Item $certPath -Force

      - name: Package Windows bundle
        if: matrix.package_kind == 'zip'
        shell: pwsh
        run: |
          $bundle = "dist/windows-bundle"
          if (Test-Path $bundle) {
            Remove-Item -Recurse -Force $bundle
          }
          New-Item -ItemType Directory -Path $bundle | Out-Null
          Copy-Item "${{ matrix.raw_desktop_binary }}" "$bundle/mistermorph-desktop.exe"
          Copy-Item "${{ matrix.bundled_backend_binary }}" "$bundle/mistermorph.exe"
          Copy-Item "LICENSE" "$bundle/LICENSE"
          @"
          MisterMorph Desktop for Windows.

          Keep mistermorph-desktop.exe and mistermorph.exe in the same directory.
          Launch the app with mistermorph-desktop.exe.
          "@ | Set-Content "$bundle/README-desktop.txt"
          if (Test-Path "dist/${{ matrix.desktop_asset }}") {
            Remove-Item -Force "dist/${{ matrix.desktop_asset }}"
          }
          Compress-Archive -Path "$bundle/*" -DestinationPath "dist/${{ matrix.desktop_asset }}"

      - name: Generate checksum
        if: runner.os != 'Windows'
        shell: bash
        run: |
          assets=("${{ matrix.desktop_asset }}")
          if [[ -n "${{ matrix.update_asset }}" && "${{ matrix.update_asset }}" != "${{ matrix.desktop_asset }}" ]]; then
            assets+=("${{ matrix.update_asset }}")
          fi
          for file in "${assets[@]}"; do
            shasum -a 256 "dist/${file}" > "dist/${file}.sha256"
          done

      - name: Generate checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $files = @("${{ matrix.desktop_asset }}")
          if ("${{ matrix.update_asset }}" -ne "" -and "${{ matrix.update_asset }}" -ne "${{ matrix.desktop_asset }}") {
            $files += "${{ matrix.update_asset }}"
          }
          foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 "dist/$file").Hash.ToLower()
            "$hash *$file" | Set-Content "dist/$file.sha256"
          }

      - name: Stage release files
        shell: bash
        run: |
          mkdir -p dist/release-upload
          cp "dist/${{ matrix.desktop_asset }}" "dist/${{ matrix.desktop_asset }}.sha256" dist/release-upload/
          if [[ -n "${{ matrix.update_asset }}" && "${{ matrix.update_asset }}" != "${{ matrix.desktop_asset }}" ]]; then
            cp "dist/${{ matrix.update_asset }}" "dist/${{ matrix.update_asset }}.sha256" dist/release-upload/
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: dist/release-upload/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${GITHUB_REF_NAME}" dist/release-upload/* --clobber

  update-manifest:
    name: Build Release Update Manifest
    if: startsWith(github.ref, 'refs/tags/')
    needs: desktop-apps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download desktop workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release-artifacts

      - name: Fetch GitHub release metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" > dist/release.json

      - name: Generate Wails update manifest
        shell: bash
        run: |
          go run ./scripts/release-update-manifest \
            -release-json dist/release.json \
            -artifacts-dir dist/release-artifacts \
            -output dist/update.json

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: update-manifest
          path: dist/update.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${GITHUB_REF_NAME}" "dist/update.json" --clobber
