name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/console/pnpm-lock.yaml

      - name: Install frontend deps
        run: pnpm --dir web/console install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir web/console build

      - name: Stage console assets
        run: ./scripts/stage-console-assets.sh

      - name: Run tests
        run: go test ./...

      - name: Run GoReleaser (tag release)
        if: startsWith(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser (snapshot)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload snapshot artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: goreleaser-dist
          path: dist/*

  desktop-apps:
    name: Build Desktop App (${{ matrix.label }})
    if: startsWith(github.ref, 'refs/tags/')
    needs: goreleaser
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-amd64
            os: ubuntu-24.04
            goos: linux
            goarch: amd64
            desktop_asset: mistermorph-desktop-linux-amd64.AppImage
            raw_desktop_binary: dist/mistermorph-desktop
            bundled_backend_binary: dist/mistermorph
            package_kind: appimage
            go_build_tags: "wailsdesktop production"
          - label: macos-arm64
            os: macos-14
            goos: darwin
            goarch: arm64
            desktop_asset: mistermorph-desktop-darwin-arm64.dmg
            raw_desktop_binary: dist/mistermorph-desktop
            bundled_backend_binary: dist/mistermorph
            package_kind: dmg
            go_build_tags: "wailsdesktop production"
          - label: windows-amd64
            os: windows-2022
            goos: windows
            goarch: amd64
            desktop_asset: mistermorph-desktop-windows-amd64.zip
            raw_desktop_binary: dist/MisterMorph.exe
            bundled_backend_binary: dist/mistermorph.exe
            package_kind: zip
            go_build_tags: "wailsdesktop production"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/console/pnpm-lock.yaml

      - name: Install frontend deps
        run: pnpm --dir web/console install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir web/console build

      - name: Stage console assets
        run: ./scripts/stage-console-assets.sh

      - name: Install Linux desktop build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Verify desktop package compiles
        run: go test -tags "${{ matrix.go_build_tags }}" ./desktop/wails -count=1

      - name: Generate Windows desktop icon resources
        if: runner.os == 'Windows'
        shell: bash
        env:
          ARCH: ${{ matrix.goarch }}
        run: ./scripts/generate-desktop-windows-resources.sh

      - name: Build desktop app binary
        shell: bash
        run: |
          mkdir -p dist
          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" \
            go build -trimpath -tags "${{ matrix.go_build_tags }}" -ldflags "-s -w" -o "${{ matrix.raw_desktop_binary }}" ./desktop/wails

      - name: Build bundled backend binary
        shell: bash
        run: |
          CGO_ENABLED=0 GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" \
            go build -trimpath -ldflags "-s -w" -o "${{ matrix.bundled_backend_binary }}" ./cmd/mistermorph

      - name: Package macOS DMG
        if: matrix.package_kind == 'dmg'
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${VERSION#v}" \
          ARCH="${ARCH}" \
          DESKTOP_BIN="${{ matrix.raw_desktop_binary }}" \
          BACKEND_BIN="${{ matrix.bundled_backend_binary }}" \
          OUT_DIR="dist" \
          ./desktop/wails/packaging/package-darwin.sh

      - name: Package Linux AppImage
        if: matrix.package_kind == 'appimage'
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${VERSION#v}" \
          ARCH="${ARCH}" \
          DESKTOP_BIN="${{ matrix.raw_desktop_binary }}" \
          BACKEND_BIN="${{ matrix.bundled_backend_binary }}" \
          OUT_DIR="dist" \
          APPIMAGE_NAME="${{ matrix.desktop_asset }}" \
          ./desktop/wails/packaging/package-linux-appimage.sh

      - name: Package Windows bundle
        if: matrix.package_kind == 'zip'
        shell: pwsh
        run: |
          $bundle = "dist/windows-bundle"
          if (Test-Path $bundle) {
            Remove-Item -Recurse -Force $bundle
          }
          New-Item -ItemType Directory -Path $bundle | Out-Null
          Copy-Item "${{ matrix.raw_desktop_binary }}" "$bundle/MisterMorph.exe"
          Copy-Item "${{ matrix.bundled_backend_binary }}" "$bundle/mistermorph.exe"
          Copy-Item "LICENSE" "$bundle/LICENSE"
          @"
          MisterMorph Desktop for Windows.

          Keep MisterMorph.exe and mistermorph.exe in the same directory.
          Launch the app with MisterMorph.exe.
          "@ | Set-Content "$bundle/README-desktop.txt"
          if (Test-Path "dist/${{ matrix.desktop_asset }}") {
            Remove-Item -Force "dist/${{ matrix.desktop_asset }}"
          }
          Compress-Archive -Path "$bundle/*" -DestinationPath "dist/${{ matrix.desktop_asset }}"

      - name: Generate checksum
        if: runner.os != 'Windows'
        shell: bash
        run: |
          file="${{ matrix.desktop_asset }}"
          shasum -a 256 "dist/${file}" > "dist/${file}.sha256"

      - name: Generate checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $file = "${{ matrix.desktop_asset }}"
          $hash = (Get-FileHash -Algorithm SHA256 "dist/$file").Hash.ToLower()
          "$hash *$file" | Set-Content "dist/$file.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: |
            dist/${{ matrix.desktop_asset }}
            dist/${{ matrix.desktop_asset }}.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "dist/${{ matrix.desktop_asset }}" \
            "dist/${{ matrix.desktop_asset }}.sha256" \
            --clobber
